# Production overlay for a public VPS (Oracle Always-Free, Hetzner, etc.).
# Use with:  docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# The base file binds every service to 127.0.0.1 (loopback) — on a VPS that
# means "not reachable from the internet". This overlay only PUBLISHES Caddy on
# 80/443, so Caddy is the single public front door and everything else stays
# private on the compose network. Set VOLTRA_DOMAIN + CADDY_ACME_EMAIL in
# .env for automatic Let's Encrypt TLS.

services:
  caddy:
    ports:
      - "80:80"      # ACME HTTP-01 challenge + HTTP->HTTPS redirect
      - "443:443"    # public HTTPS
      - "443:443/udp"  # HTTP/3 (QUIC)
