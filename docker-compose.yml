services:
  freqtrade:
    image: freqtradeorg/freqtrade:stable
    restart: unless-stopped
    container_name: solsignal-freqtrade
    volumes:
      - "./user_data:/freqtrade/user_data"
    # FreqUI is bundled in the image and served by the api_server at this port.
    # Bound to localhost only — front with a reverse proxy + TLS before exposing.
    ports:
      - "127.0.0.1:8080:8080"
    env_file:
      - .env
    command: >
      trade
      --logfile /freqtrade/user_data/logs/freqtrade.log
      --db-url sqlite:////freqtrade/user_data/tradesv3.dryrun.sqlite
      --config /freqtrade/user_data/config.json
      --strategy TrendBreakStrategy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request as u; u.urlopen('http://localhost:8080/api/v1/ping', timeout=5)"]
      interval: 60s
      timeout: 10s
      retries: 5

  # Bot #2: BTC/ETH -> SOL cross-asset lead-lag strategy. One bot = one
  # container + one config + one port + one database. Register it in FreqUI
  # via "Add new bot" with URL http://127.0.0.1:8081 and the same .env login.
  freqtrade-cross:
    image: freqtradeorg/freqtrade:stable
    restart: unless-stopped
    container_name: solsignal-freqtrade-cross
    volumes:
      - "./user_data:/freqtrade/user_data"
    ports:
      - "127.0.0.1:8081:8080"
    env_file:
      - .env
    command: >
      trade
      --logfile /freqtrade/user_data/logs/freqtrade-cross.log
      --db-url sqlite:////freqtrade/user_data/tradesv3.cross.dryrun.sqlite
      --config /freqtrade/user_data/config.cross.json
      --strategy SolCrossSignalStrategy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request as u; u.urlopen('http://localhost:8080/api/v1/ping', timeout=5)"]
      interval: 60s
      timeout: 10s
      retries: 5

  # Daily dry-run vs backtest divergence report -> docs/reports/.
  # Talks to the bots over the compose network, so no host scheduler needed.
  reporter:
    image: freqtradeorg/freqtrade:stable
    restart: unless-stopped
    container_name: solsignal-reporter
    volumes:
      - "./scripts:/freqtrade/scripts:ro"
      - "./docs:/freqtrade/docs"
    env_file:
      - .env
    environment:
      - SOLSIGNAL_BOT1_URL=http://freqtrade:8080
      - SOLSIGNAL_BOT2_URL=http://freqtrade-cross:8080
    entrypoint: ["/bin/sh", "-c"]
    # Regenerate every 6h (not 24h): the date-stamped file is overwritten
    # through the day, so a snapshot taken during a bot restart self-heals by
    # the next cycle instead of persisting a stale UNREACHABLE report all day.
    command: ["while true; do python /freqtrade/scripts/report.py --out-dir /freqtrade/docs/reports || echo '[reporter] failed - retrying next cycle'; sleep 21600; done"]

  # Custom SolSignal dashboard (Tailwind, static) — reads the freqtrade REST API.
  dashboard:
    image: nginx:alpine
    restart: unless-stopped
    container_name: solsignal-dashboard
    volumes:
      - "./dashboard:/usr/share/nginx/html:ro"
    ports:
      - "127.0.0.1:8899:80"

  # NOTE: the old data-daemon was REMOVED 2026-07-09. Its --dl-trades --days 14
  # refresh rebuilt candles from a 14-day trade window and OVERWROTE the deep
  # archive feathers, silently truncating backtest history to 14 days.
  # Backtest data now comes from scripts/import_kraken_csv.py (quarterly Kraken
  # archive). Live bots self-maintain recent candles via the exchange API in
  # trade mode, so no background downloader is needed.
